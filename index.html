<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ضرب رضا نعجة</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f0f0f0; }
        #reda-image { 
            width: 200px; /* الحجم الابتدائي */
            margin: 50px auto; 
            cursor: pointer;
            transition: transform 0.1s;
        }
    </style>
</head>
<body>

    <h1>لعبة: ضرب رضا نعجة</h1>
    <p>اضغط على رضا نعجة لزيادة حجمه!</p>
    
    <img id="reda-image" src="reda.PNG" alt="رضا نعجة" onclick="growBelly()">
    
    <h2 id="score">نقرات: 0</h2>

    <script>
        let width = 200;
        let clicks = 0;

        function growBelly() {
            clicks++;
            width += 10; // زيادة العرض
            let img = document.getElementById('reda-image');
            img.style.width = width + "px";
            document.getElementById('score').innerText = "نقرات: " + clicks;
            
            if (width > 600) {
                alert("انفجر رضا نعجة! لقد فزت.");
                width = 200;
                clicks = 0;
                img.style.width = width + "px";
            }
        }
    </script>
</body>
</html>
